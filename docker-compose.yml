services:
  # Serviço do Banco de Dados MySQL
  db:
    image: mysql:8.0
    container_name: brazcom_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: America/Sao_Paulo
    ports:
      # Porta de produção: 3315 (host) -> 3306 (container)
      - "3315:3306"
    volumes:
      - brazcom_db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "-p${MYSQL_ROOT_PASSWORD}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - brazcom_network

  # Banco de Dados PostgreSQL para a Evolution API (Corrige bugs do Prisma/MySQL)
  evolution_db:
    image: postgres:15
    container_name: brazcom_evolution_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: evolution_password
      POSTGRES_DB: evolution
      TZ: America/Sao_Paulo
    volumes:
      - evolution_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brazcom_network

  # Serviço do Backend (API FastAPI)
  backend:
    build: ./backend
    container_name: brazcom_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      # Monta o diretório de certificados do host para dentro do container
      # Usa a variável CERTIFICATES_DIR definida no .env na raiz
      - "${CERTIFICATES_DIR:-/etc/ssl/nfcom}:/etc/ssl/nfcom:rw"
    ports:
      # Porta de produção: 8015 (host) -> 8000 (container)
      - "8015:8000"
    depends_on:
      - db
    networks:
      - brazcom_network
    environment:
      # Sobrescreve configurações para ambiente Docker
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      - CERTIFICATES_DIR=/etc/ssl/nfcom
      - TZ=America/Sao_Paulo

  # Serviço do Scheduler (Cron para processamento diário)
  scheduler:
    build: ./backend
    container_name: brazcom_scheduler
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - brazcom_network
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@db:3306/${MYSQL_DATABASE}
      - TZ=America/Sao_Paulo
    entrypoint: /scheduler-entrypoint.sh

  # Serviço do Frontend (React)
  frontend:
    build: ./frontend
    container_name: brazcom_frontend
    restart: unless-stopped
    environment:
      # Em produção com proxy reverso (Apache/Nginx), usa caminho relativo
      # O Apache em nfcom.holeshot.com.br faz proxy de /api para o backend
      - REACT_APP_API_BASE_URL=/api
      - TZ=America/Sao_Paulo
    ports:
      # Porta de produção: 3015 (host) -> 3000 (container)
      - "3015:3000"
    networks:
      - brazcom_network

  # Serviço do Evolution API (WhatsApp Gateway)
  evolution_api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: brazcom_evolution_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TZ=America/Sao_Paulo
      - SERVER_PORT=8080
      - DELAY_MESSAGE=1000
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=c6145a8e18df283b40d7c0bb9c3a3fe40a927fa1e5c2cf9b33adcdbf84f29107
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://postgres:evolution_password@evolution_db:5432/evolution?schema=public
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true
    volumes:
      - brazcom_evolution_data:/evolution/instances
    depends_on:
      evolution_db:
        condition: service_healthy
    networks:
      - brazcom_network

  # Serviço de Backup (MySQL + Rclone GDrive)
  backup:
    image: mysql:8.0
    container_name: brazcom_backup
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backups:/backups
      - ./backup/mysql_backup_container.sh:/usr/local/bin/backup.sh
      - ./backup/rclone.conf:/root/.config/rclone/rclone.conf
    environment:
      - DB_HOST=db
      - DB_NAME=${MYSQL_DATABASE}
      - DB_USER=root
      - DB_PASSWORD=${MYSQL_ROOT_PASSWORD}
    command: |
      bash -c "
        microdnf update && microdnf install -y curl unzip gzip
        curl https://rclone.org/install.sh | bash
        chmod +x /usr/local/bin/backup.sh
        while true; do
          sleep 7200  # 2 horas
          /usr/local/bin/backup.sh
        done
      "
    networks:
      - brazcom_network

networks:
  brazcom_network:
    driver: bridge

volumes:
  brazcom_db_data:
    driver: local
  brazcom_evolution_data:
    driver: local
  evolution_db_data:
    driver: local
